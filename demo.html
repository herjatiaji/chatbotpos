<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe AI Analyst - Web Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ece5dd;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .chat-header {
            background-color: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .setup-panel {
            padding: 15px;
            background: #eee;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 10px;
        }

        .setup-panel input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background-color: #dcf8c6;
        }

        .message.received {
            align-self: flex-start;
            background-color: white;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
            border-top: 1px solid #ccc;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 1em;
        }

        .chat-input button {
            background-color: #075e54;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input button:disabled {
            background-color: #ccc;
        }

        .loading {
            font-style: italic;
            color: #666;
            align-self: flex-start;
            background-color: transparent !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🤖 Cafe AI Analyst Demo
    </div>

    <div class="setup-panel">
        <label style="align-self: center;">Phone Number:</label>
        <input type="text" id="phoneInput" placeholder="e.g. 62811111111" value="62811111111">
    </div>

    <div class="chat-messages" id="chatBox">
        <div class="message received">Halo! Saya Tantri, asisten Cafe Anda. Masukkan nomor telepon di atas dan kirim pesan untuk mulai.</div>
    </div>

    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Ketik pesan..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const phoneInput = document.getElementById('phoneInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        // Convert simple line breaks to <br> for HTML display
        msgDiv.innerHTML = text.replace(/\n/g, '<br>');
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        const phone = phoneInput.value.trim();

        if (!text || !phone) return;

        // Add User Message
        addMessage(text, 'sent');
        messageInput.value = '';

        // Disable input
        messageInput.disabled = true;
        sendBtn.disabled = true;

        // Add Loading indicator
        const loadingMsg = addMessage('AI sedang memproses...', 'received loading');

        try {
            const response = await fetch('/api/demo/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, message: text })
            });

            const data = await response.json();

            // Remove Loading
            chatBox.removeChild(loadingMsg);

            if (response.ok) {
                addMessage(data.reply, 'received');
            } else {
                addMessage(`❌ Error: ${data.error}`, 'received');
            }
        } catch (err) {
            chatBox.removeChild(loadingMsg);
            addMessage(`❌ Gagal terhubung ke server.`, 'received');
        }

        // Enable input
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
